<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>摄像头管理</title>
<style>
:root { --bg:#0a0e14; --card:#111922; --border:#1e2d3d; --accent:#4fc3f7; --text:#c8d8e0; --muted:#5a7a8a; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
header {
    padding:14px 20px; background:var(--card); border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:center; gap:16px;
}
header h1 { font-size:20px; color:var(--accent); font-weight:400; }
.nav-link {
    color:var(--accent); text-decoration:none; font-size:13px;
    border:1px solid var(--accent); padding:5px 14px; border-radius:14px;
}
.nav-link:hover { background:var(--accent); color:#000; }
.container { max-width:700px; margin:24px auto; padding:0 16px; }

.card {
    background:var(--card); border:1px solid var(--border); border-radius:10px;
    padding:20px; margin-bottom:14px;
}
.card h2 { font-size:17px; color:var(--accent); font-weight:400; margin-bottom:14px; }

.cam-row {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 14px; border-bottom:1px solid var(--border);
}
.cam-row:last-child { border-bottom:none; }
.cam-info { flex:1; }
.cam-info .name { font-size:15px; font-weight:500; }
.cam-info .src { font-size:12px; color:var(--muted); margin-top:2px; }
.cam-actions { display:flex; gap:8px; }

.btn {
    padding:6px 14px; font-size:13px; border:none; border-radius:8px;
    cursor:pointer; font-weight:500; transition:all .15s;
}
.btn-rename { background:var(--accent); color:#000; }
.btn-rename:hover { opacity:.85; }
.btn-delete { background:transparent; border:1px solid #c62828 !important; color:#ef5350; }
.btn-delete:hover { background:#c62828; color:#fff; }

/* ---- Add form ---- */
.form-row { display:flex; gap:10px; align-items:flex-end; }
.form-group { flex:1; }
.form-group label { display:block; font-size:12px; color:var(--muted); margin-bottom:4px; }
.form-group input, .form-group select {
    width:100%; padding:9px 12px; border:1px solid var(--border);
    border-radius:8px; background:var(--bg); color:var(--text); font-size:14px; outline:none;
}
.form-group input:focus { border-color:var(--accent); }
.btn-add {
    padding:9px 20px; font-size:14px; background:#4caf50; color:#fff;
    border:none; border-radius:8px; cursor:pointer; font-weight:bold; white-space:nowrap;
}
.btn-add:hover { opacity:.85; }

.hint { font-size:12px; color:var(--muted); margin-top:10px; }

.toast {
    position:fixed; top:20px; left:50%; transform:translateX(-50%);
    padding:10px 24px; border-radius:8px; font-size:14px; z-index:9999; display:none;
}
.toast.success { display:block; background:#1b3a2a; border:1px solid #2e7d32; color:#81c784; }
.toast.error { display:block; background:#3a1b1b; border:1px solid #c62828; color:#ef9a9a; }
</style>
</head>
<body>
<header>
    <h1>摄像头管理</h1>
    <a href="/" class="nav-link">← 返回监控</a>
</header>
<div class="container">
    <!-- Camera list -->
    <div class="card">
        <h2>已配置摄像头</h2>
        <div id="camList"></div>
        <div class="hint">⚠ 增删摄像头后需重启服务生效</div>
    </div>

    <!-- Add new camera -->
    <div class="card">
        <h2>添加摄像头</h2>
        <div class="form-row">
            <div class="form-group">
                <label>类型</label>
                <select id="addType" onchange="onTypeChange()">
                    <option value="usb">USB 摄像头</option>
                    <option value="rtsp">RTSP 网络流</option>
                </select>
            </div>
            <div class="form-group">
                <label id="addLabel">设备编号 (0, 1, 2...)</label>
                <input type="text" id="addSource" value="2" placeholder="0">
            </div>
            <button class="btn-add" onclick="addCamera()">+ 添加</button>
        </div>
    </div>
</div>
<div id="toast" class="toast"></div>

<script>
function onTypeChange() {
    const type = document.getElementById('addType').value;
    document.getElementById('addLabel').textContent = type === 'usb' ? '设备编号 (0, 1, 2...)' : 'RTSP 地址';
    document.getElementById('addSource').value = type === 'usb' ? '2' : 'rtsp://admin:password@192.168.1.64:554/Streaming/Channels/101';
}

async function loadList() {
    const resp = await fetch('/api/cameras');
    const cams = await resp.json();
    document.getElementById('camList').innerHTML = cams.map(c => `
        <div class="cam-row">
            <div class="cam-info">
                <div class="name">${esc(c.name)} <span style="color:var(--muted);font-size:12px;">(ID:${c.id})</span></div>
                <div class="src">来源: ${c.source}</div>
            </div>
            <div class="cam-actions">
                <button class="btn btn-rename" onclick="renameCam(${c.id})">重命名</button>
                ${cams.length > 1 ? `<button class="btn btn-delete" onclick="deleteCam(${c.id})">删除</button>` : ''}
            </div>
        </div>
    `).join('');
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function renameCam(id) {
    const name = prompt('输入新名称：');
    if (!name || !name.trim()) return;
    try {
        const resp = await fetch(`/api/camera/${id}/rename`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({name:name.trim()})
        });
        const d = await resp.json();
        if (d.ok) { loadList(); showToast('名称已更新', 'success'); }
        else showToast(d.error, 'error');
    } catch(e) { showToast('失败', 'error'); }
}

async function deleteCam(id) {
    if (!confirm('确定删除此摄像头？删除后需重启生效。')) return;
    try {
        const resp = await fetch(`/api/cameras?id=${id}`, { method:'DELETE' });
        const d = await resp.json();
        if (d.ok) { loadList(); showToast(d.message, 'success'); }
        else showToast(d.error, 'error');
    } catch(e) { showToast('失败', 'error'); }
}

async function addCamera() {
    const type = document.getElementById('addType').value;
    let source = document.getElementById('addSource').value.trim();
    if (!source) return alert('请填写来源');
    if (type === 'usb') source = parseInt(source);
    try {
        const resp = await fetch('/api/cameras', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({source})
        });
        const d = await resp.json();
        if (d.ok) { loadList(); showToast(d.message, 'success'); }
        else showToast(d.error, 'error');
    } catch(e) { showToast('添加失败', 'error'); }
}

function showToast(text, type) {
    const t = document.getElementById('toast');
    t.textContent = text; t.className = 'toast ' + type;
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 3000);
}

loadList();
</script>
</body>
</html>

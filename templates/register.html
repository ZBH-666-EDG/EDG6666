<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人脸注册 - 跌倒监测系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #0f1923; color: #e0e0e0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        header {
            width: 100%; padding: 16px 20px; background: #1a2d3d;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center; gap: 20px;
        }
        header h1 { font-size: 22px; color: #4fc3f7; font-weight: 400; }
        .nav-link {
            color: #4fc3f7; text-decoration: none; font-size: 14px;
            border: 1px solid #4fc3f7; padding: 6px 15px; border-radius: 16px;
        }
        .nav-link:hover { background: #4fc3f7; color: #0f1923; }

        .card {
            margin-top: 30px; width: 500px; background: #1a2d3d;
            border: 1px solid #2a4a5c; border-radius: 12px; padding: 30px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }
        .card h2 { font-size: 20px; color: #4fc3f7; margin-bottom: 20px; font-weight: 400; text-align: center; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 14px; color: #a0c4d0; }
        .form-group input[type="text"] {
            width: 100%; padding: 10px 14px; border: 1px solid #2a4a5c;
            border-radius: 8px; background: #0f1923; color: #e0e0e0; font-size: 15px; outline: none;
        }
        .form-group input[type="text"]:focus { border-color: #4fc3f7; }

        /* ---- Wizard progress ---- */
        .progress { display: flex; gap: 8px; margin-bottom: 20px; }
        .progress .step {
            flex: 1; text-align: center; padding: 8px; border-radius: 8px;
            background: #0f1923; border: 1px solid #2a4a5c; font-size: 13px; color: #5a7a8a;
        }
        .progress .step.active { border-color: #4fc3f7; color: #4fc3f7; font-weight: bold; }
        .progress .step.done { border-color: #4caf50; color: #81c784; }

        /* ---- Camera area ---- */
        .camera-preview {
            width: 100%; max-height: 260px; border-radius: 8px;
            border: 2px solid #2a4a5c; background: #000; display: block; margin-bottom: 10px;
        }
        .instruction {
            text-align: center; font-size: 18px; color: #ff9800;
            margin-bottom: 10px; font-weight: bold;
        }
        .captured-list { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; min-height: 60px; }
        .captured-list img {
            width: 80px; height: 80px; object-fit: cover;
            border-radius: 6px; border: 2px solid #2a4a5c;
        }
        .captured-list img.thumb { border-color: #4caf50; }

        .btn-row { display: flex; gap: 10px; margin-top: 14px; }
        .btn-primary {
            flex: 1; padding: 12px; font-size: 16px; background: #4fc3f7;
            color: #0f1923; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        .btn-primary:hover { background: #81d4fa; }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-capture {
            flex: 1; padding: 12px; font-size: 16px; background: #ff9800;
            color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        .btn-capture:hover { background: #ffb74d; }

        .btn-submit {
            width: 100%; padding: 14px; font-size: 17px;
            background: #4caf50; color: #fff; border: none;
            border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 16px;
        }
        .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

        .message {
            margin-top: 14px; padding: 12px 16px; border-radius: 8px;
            font-size: 14px; display: none; text-align: center;
        }
        .message.success { display: block; background: #1b3a2a; border: 1px solid #2e7d32; color: #81c784; }
        .message.error { display: block; background: #3a1b1b; border: 1px solid #c62828; color: #ef9a9a; }
    </style>
</head>
<body>
<header>
    <h1>人脸注册 - 跌倒监测系统</h1>
    <a href="/" class="nav-link">← 返回监控</a>
</header>

<div class="card">
    <h2>三步注册</h2>

    <!-- Progress bar -->
    <div class="progress">
        <div class="step active" id="step1Label">1. 正面</div>
        <div class="step" id="step2Label">2. 稍左转</div>
        <div class="step" id="step3Label">3. 稍右转</div>
    </div>

    <!-- Step content -->
    <div id="stepContent">
        <div class="form-group">
            <label for="name">姓名</label>
            <input type="text" id="name" placeholder="请输入老人姓名" required autocomplete="off">
        </div>

        <div id="wizardArea">
            <div class="instruction" id="instruction">请正对摄像头</div>
            <img id="cameraPreview" class="camera-preview" src="/video_feed" alt="Preview">
            <div class="captured-list" id="capturedList"></div>
            <button class="btn-capture" id="btnCapture" onclick="captureStep()">📷 拍照</button>
        </div>
    </div>

    <!-- Submit area (hidden until all 3 captured) -->
    <div id="submitArea" style="display:none;">
        <button class="btn-submit" id="btnSubmit" onclick="doSubmit()">提 交 注 册（共 <span id="submitCount">0</span> 张）</button>
    </div>

    <div id="message" class="message"></div>
</div>

<script>
let currentStep = 1;
const captures = [null, null, null, null]; // index 1..3
const instructions = ['', '请正对摄像头', '头部稍向左转', '头部稍向右转'];

function updateUI() {
    // Progress labels
    for (let i = 1; i <= 3; i++) {
        const el = document.getElementById('step' + i + 'Label');
        el.classList.remove('active', 'done');
        if (captures[i]) el.classList.add('done');
        else if (i === currentStep) el.classList.add('active');
    }

    // Instruction
    document.getElementById('instruction').textContent =
        currentStep <= 3 ? instructions[currentStep] + (captures[currentStep] ? ' ✓' : '') : '';

    // Thumbnails
    const list = document.getElementById('capturedList');
    list.innerHTML = '';
    for (let i = 1; i <= 3; i++) {
        if (captures[i]) {
            list.innerHTML += `<img class="thumb" src="${URL.createObjectURL(captures[i])}" title="步骤${i}">`;
        }
    }

    // Capture button
    const btn = document.getElementById('btnCapture');
    if (currentStep > 3) {
        btn.style.display = 'none';
        document.getElementById('submitArea').style.display = 'block';
        document.getElementById('submitCount').textContent =
            captures.filter((_, i) => i > 0 && captures[i]).length;
    } else {
        btn.style.display = 'block';
        btn.textContent = captures[currentStep] ? '📷 重拍' : '📷 拍照';
        document.getElementById('submitArea').style.display = 'none';
    }
}

async function captureStep() {
    if (!document.getElementById('name').value.trim()) {
        alert('请先输入姓名');
        return;
    }
    try {
        const resp = await fetch('/capture_frame');
        if (!resp.ok) { alert('抓取失败，请确认摄像头已开启'); return; }
        const blob = await resp.blob();
        captures[currentStep] = blob;
        currentStep++;
        updateUI();
    } catch (err) { alert('抓取失败: ' + err.message); }
}

async function doSubmit() {
    const name = document.getElementById('name').value.trim();
    if (!name) { alert('请输入姓名'); return; }

    const msg = document.getElementById('message');
    msg.className = 'message';
    msg.style.display = 'none';

    const btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    btn.textContent = '提交中...';

    const fd = new FormData();
    fd.append('name', name);
    let count = 0;
    for (let i = 1; i <= 3; i++) {
        if (captures[i]) {
            fd.append('photo', captures[i], `step${i}.jpg`);
            count++;
        }
    }

    try {
        const resp = await fetch('/register', { method: 'POST', body: fd });
        const data = await resp.json();
        if (data.ok) {
            msg.className = 'message success';
            msg.textContent = data.message;
            // Reset
            document.getElementById('name').value = '';
            for (let i = 1; i <= 3; i++) captures[i] = null;
            currentStep = 1;
            updateUI();
        } else {
            msg.className = 'message error';
            msg.textContent = data.error;
        }
        msg.style.display = 'block';
    } catch (err) {
        msg.className = 'message error';
        msg.textContent = '网络错误: ' + err.message;
        msg.style.display = 'block';
    }
    btn.disabled = false;
    btn.textContent = '提 交 注 册';
}

updateUI();
</script>
</body>
</html>
